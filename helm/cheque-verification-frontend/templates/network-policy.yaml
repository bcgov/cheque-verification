apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cheque-verification-frontend-network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cheque-verification-frontend
  policyTypes:
    - Ingress
  ingress:
    # Allow health probes from kubelet and all external traffic
    - ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001
---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-traffic-from-gateway-to-your-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cheque-verification-frontend
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              environment: test
              name: 264e6f
    - from:
        - namespaceSelector:
            matchLabels:
              environment: prod
              name: 264e6f