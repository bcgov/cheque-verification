replicaCount: 1

image:
  repository: ghcr.io/bcgov/cheque-verification-frontend
  tag: main
  pullPolicy: Always

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

# Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity: {}

# Config for the frontend (API endpoints, etc.)
config:
  BACKEND_URL: "http://cheque-verification-backend:80"
