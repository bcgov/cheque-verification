replicaCount: 2

image:
  repository: ghcr.io/bcgov/cheque-verification-frontend
  tag: main
  pullPolicy: Always

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

# Container resource requests and limits
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Config for the frontend (API endpoints, etc.)
config:
  BACKEND_URL: "http://cheque-verification-backend:80"
  # Set to "true" to show the update issue warning banner
  BANNER_UPDATE_ISSUE: ""
  # Set to "true" to show the system outage warning banner
  BANNER_OUTAGE: ""
