replicaCount: 1

image:
  repository: ghcr.io/bcgov/cheque-verification-backend
  tag: main
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity: {}

# Container resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
